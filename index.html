<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NovaMaster - AI Automation Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    h1 { font-size: 3em; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { font-size: 1.2em; color: #888; margin: 10px 0 40px; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
    .feature { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .feature h3 { color: #00d9ff; margin-bottom: 10px; }
    .feature p { color: #aaa; font-size: 0.9em; }
    .btn { display: inline-block; padding: 15px 40px; background: linear-gradient(90deg, #00d9ff, #00ff88); color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 30px; }
    .status { margin-top: 40px; padding: 20px; background: rgba(0,217,255,0.1); border-radius: 12px; }
    .status span { color: #00ff88; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NovaMaster</h1>
    <p class="tagline">AI Automation Platform - 40+ Models - n8n Workflows</p>
    <div class="features">
      <div class="feature"><h3>40+ AI Models</h3><p>Ollama, Claude, GPT, Gemini, DeepSeek</p></div>
      <div class="feature"><h3>n8n Workflows</h3><p>Automate with visual workflows</p></div>
      <div class="feature"><h3>Open WebUI</h3><p>Chat with any model</p></div>
      <div class="feature"><h3>Private</h3><p>Self-hosted, your data</p></div>
    </div>
    <div class="status"><span>Online</span> - RTX 5070 - 12GB VRAM</div>
    <a href="https://github.com/roseonlineownz-lab/NovaMaster" class="btn">GitHub</a>
  </div>
</body>
</html>
