<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NovaMaster - AI Automation Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); min-height: 100vh; color: #fff; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    h1 { font-size: 3em; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { color: #888; margin: 10px 0 40px; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 30px 0; }
    .feature { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
    .feature h3 { color: #00d9ff; font-size: 1em; margin-bottom: 8px; }
    .feature p { color: #aaa; font-size: 0.85em; }
    .btn { display: inline-block; padding: 12px 35px; background: linear-gradient(90deg, #00d9ff, #00ff88); color: #000; text-decoration: none; border-radius: 25px; font-weight: bold; margin-top: 25px; }
    .status { margin-top: 30px; padding: 15px; background: rgba(0,255,136,0.1); border-radius: 10px; color: #00ff88; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NovaMaster</h1>
    <p class="tagline">AI Automation Platform - 40+ Models - n8n Workflows</p>
    <div class="features">
      <div class="feature"><h3>40+ Models</h3><p>Ollama, Claude, GPT, Gemini</p></div>
      <div class="feature"><h3>n8n</h3><p>Visual automation</p></div>
      <div class="feature"><h3>Open WebUI</h3><p>Chat interface</p></div>
      <div class="feature"><h3>Private</h3><p>Self-hosted</p></div>
    </div>
    <div class="status">Online - RTX 5070 - 12GB VRAM</div>
    <a href="https://github.com/roseonlineownz-lab/NovaMaster" class="btn">GitHub</a>
  </div>
</body>
</html>
